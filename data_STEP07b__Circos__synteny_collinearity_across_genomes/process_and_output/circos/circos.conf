karyotype = karyotype.txt

<image>
dir   = .
file  = circos
png   = yes
svg   = yes
radius = 1500p
</image>

<<include etc/colors_fonts_patterns.conf>>
<<include etc/housekeeping.conf>>

# Enable ticks
show_ticks          = yes
show_tick_labels    = yes

chromosomes_units = 100000
chromosomes_display_default = yes

# Put genome1 and genome2 on opposite halves
# If you have multiple replicons, list them explicitly in the order you want.
# Example:
# chromosomes = genome1_NC_000000_1;genome2_NC_000000_1
# chromosomes_order = genome1_NC_000000_1,genome2_NC_000000_1
# For a quick start, you can omit and let Circos place everything.

<ideogram>
<spacing>
default = 0.02r
</spacing>
radius    = 0.85r
thickness = 5p
fill      = yes
fill_color = black
stroke_color = black
stroke_thickness = 1p
show_label = yes
label_font = default
label_radius = 1.02r
label_size = 18p
show_ticks = yes
show_tick_labels = no
</ideogram>

<ticks>

<tick>
spacing = 100000
size = 20p
thickness = 4p
color = black
force_display = yes
radius = dims(ideogram,radius_outer)
show_label = yes
label_size = 20p
label_offset = 5p
format = %.1f
multiplier = 1e-6
</tick>

</ticks>

# Optional: plot gene density-like bars (here just CDS intervals as value=1)
<plots>
<plot>
type = histogram
file = genome1.genes.txt
r1 = 0.84r
r0 = 0.72r
min = 0
max = 1
thickness = 1
extend_bin = no
</plot>

<plot>
type = histogram
file = genome2.genes.txt
r1 = 0.28r
r0 = 0.16r
min = 0
max = 1
thickness = 1
extend_bin = no
</plot>
</plots>


<links>
  <link>
    file   = links.txt
    radius = 0.90r

    thickness = 3p
    stroke_thickness = 2p

    color = blue

    <rules>
      <rule>
        condition = var(inv) == 1
        color     = red
      </rule>
    </rules>

  </link>
</links>

